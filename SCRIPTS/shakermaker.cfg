# ==============================================================================
#  ShakerMaker - Windows Configuration File
#  Edit this file ONCE before running any script.
#  All scripts (setup, junction, build) read from here.
# ==============================================================================

# --- Python -------------------------------------------------------------------
# Python version to use for the virtual environment and build
PYTHON_VERSION      = 3.10
PYTHON_FULL_VERSION = 3.10.9

# --- Virtual Environment ------------------------------------------------------
# Name of the virtual environment to create (or reuse if it already exists)
# If you have a legacy environment (e.g. shaker_test00), put its name here
VENV_NAME           = shaker_test02

# Base folder where the virtual environment will be created
# Result: C:\Users\<your_username>\<VENV_NAME>
VENV_BASE           = C:\Users\%USERNAME%

# --- Build paths --------------------------------------------------------------
# Folder where the junction will be created (no spaces allowed here)
COMPILER_DIR        = C:\shakermaker_compiler

# Full path to your ShakerMaker repository (may contain spaces - that is OK)
# The junction script will create a space-free link automatically
# Example (uncomment and edit):

# --- Python dependencies ------------------------------------------------------
# Space-separated list of pip packages to install in the virtual environment
# Use package==version to pin a specific version
PYTHON_DEPS = numpy==1.26.4 setuptools wheel h5py mpi4py matplotlib scipy
SHAKERMAKER_SOURCE = C:\Dropbox\01. Brain\11. GitHub\ShakerMaker_OP
